name: native-route

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  native-route:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-msvc
            os: windows-latest
            toolchain: stable
            smoke: powershell
          - name: windows-gnu
            os: windows-latest
            toolchain: stable-x86_64-pc-windows-gnu
            smoke: powershell
          - name: linux-gnu
            os: ubuntu-latest
            toolchain: stable
            smoke: sh
          - name: macos-x86_64
            os: macos-15-intel
            toolchain: stable
            smoke: sh
          - name: macos-aarch64
            os: macos-15
            toolchain: stable
            smoke: sh

    defaults:
      run:
        working-directory: compiler
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install ${{ matrix.toolchain }}
          rustup default ${{ matrix.toolchain }}
          rustc -Vv
          cargo -V

      - name: Configure Windows GNU linker
        if: matrix.name == 'windows-gnu'
        shell: pwsh
        run: |
          "ORI_USE_RUST_LLD=1" >> $env:GITHUB_ENV
          "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=rust-lld" >> $env:GITHUB_ENV

      - name: Check compiler crates
        run: cargo check -p ori-types -p ori-hir -p ori-codegen -p ori-driver -p ori-runtime

      - name: Test runtime
        run: cargo test -p ori-runtime

      - name: Test native driver integration
        run: cargo test -p ori-driver --test multifile_imports

      - name: Test async diagnostics and runtime bridge
        run: cargo test -p ori-driver --test concurrency_async

      - name: Test diagnostic catalog
        run: cargo test -p ori-driver --test diagnostic_catalog

      - name: Native release package (Windows)
        if: matrix.smoke == 'powershell'
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          .\tools\package_native_release.ps1 `
            -PackageRoot "compiler\target\dist\ori-${{ matrix.name }}" `
            -ArchivePath "compiler\target\dist\ori-${{ matrix.name }}.zip" `
            -Force

      - name: Native release package (Unix)
        if: matrix.smoke == 'sh'
        working-directory: ${{ github.workspace }}
        run: |
          sh tools/package_native_release.sh \
            --package-root "compiler/target/dist/ori-${{ matrix.name }}" \
            --archive "compiler/target/dist/ori-${{ matrix.name }}.tar.gz" \
            --force

      - name: Upload native release package
        uses: actions/upload-artifact@v4
        with:
          name: ori-${{ matrix.name }}
          path: |
            compiler/target/dist/ori-${{ matrix.name }}.zip
            compiler/target/dist/ori-${{ matrix.name }}.tar.gz
          if-no-files-found: error

  # ------------------------------------------------------------------
  # M1: Smoke test on a runner WITHOUT the Rust toolchain installed.
  # Validates end users can use check/run/compile/test without Rust.
  # ------------------------------------------------------------------
  smoke-no-rust-linux:
    name: smoke-no-rust (linux-gnu)
    needs: native-route
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system linker only (no Rust)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          if command -v rustc >/dev/null 2>&1; then
            echo "ERROR: rustc is present on this runner — smoke would be invalid"
            exit 1
          fi
          if command -v cargo >/dev/null 2>&1; then
            echo "ERROR: cargo is present on this runner — smoke would be invalid"
            exit 1
          fi

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: ori-linux-gnu
          path: dist

      - name: Extract release package
        run: |
          mkdir -p ~/ori-smoke
          tar -xzf dist/ori-linux-gnu.tar.gz -C ~/ori-smoke --strip-components=1
          ls -la ~/ori-smoke/

      - name: Smoke — package without Rust
        run: |
          sh tools/smoke_no_rust.sh --package-root ~/ori-smoke

  # Deferred under Linux-only package policy (BACKLOG DIST-1).
  smoke-no-rust-windows:
    name: smoke-no-rust (windows-msvc)
    if: false
    needs: native-route
    runs-on: windows-latest
    steps:
      - name: Ensure Rust is not present
        shell: pwsh
        run: |
          if (Get-Command rustc -ErrorAction SilentlyContinue) {
            Write-Error "rustc is present on this runner — smoke would be invalid"
            exit 1
          }
          if (Get-Command cargo -ErrorAction SilentlyContinue) {
            Write-Error "cargo is present on this runner — smoke would be invalid"
            exit 1
          }

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: ori-windows-msvc
          path: dist

      - name: Extract release package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:USERPROFILE\ori-smoke | Out-Null
          Expand-Archive -Path dist\ori-windows-msvc.zip -DestinationPath $env:USERPROFILE\ori-smoke -Force
          # Zip may contain a top-level folder; flatten if needed
          $ori = Get-ChildItem -Path $env:USERPROFILE\ori-smoke -Recurse -Filter ori.exe | Select-Object -First 1
          if ($null -eq $ori) { throw "ori.exe not found in package" }
          $pkg = $ori.Directory.FullName
          Set-Content -Path $env:TEMP\ori-pkg-path.txt -Value $pkg
          Get-ChildItem $pkg

      - name: Smoke — ori doctor
        shell: pwsh
        run: |
          $pkg = Get-Content $env:TEMP\ori-pkg-path.txt
          & "$pkg\ori.exe" doctor

      - name: Smoke — ori run (JIT)
        shell: pwsh
        run: |
          $pkg = Get-Content $env:TEMP\ori-pkg-path.txt
          $src = @"
          module app.smoke_hello
          import ori.io = io
          main()
              io.println("hello from smoke-no-rust")
          end
          "@
          Set-Content -Path $env:TEMP\hello.orl -Value $src
          $env:ORI_REQUIRE_PACKAGED_RUNTIME = "1"
          & "$pkg\ori.exe" run $env:TEMP\hello.orl

      - name: Smoke — ori compile (AOT)
        shell: pwsh
        run: |
          $pkg = Get-Content $env:TEMP\ori-pkg-path.txt
          $env:ORI_REQUIRE_PACKAGED_RUNTIME = "1"
          & "$pkg\ori.exe" compile $env:TEMP\hello.orl --out $env:TEMP\hello.exe
          & $env:TEMP\hello.exe

      - name: Smoke — ori test
        shell: pwsh
        run: |
          $pkg = Get-Content $env:TEMP\ori-pkg-path.txt
          $src = @"
          module app.smoke_test
          import ori.test = test
          @test
          smoke_test()
              test.assert(true, "smoke test passes")
          end
          "@
          Set-Content -Path $env:TEMP\test.orl -Value $src
          $env:ORI_REQUIRE_PACKAGED_RUNTIME = "1"
          & "$pkg\ori.exe" test $env:TEMP\test.orl

  # Deferred under Linux-only package policy (BACKLOG DIST-2).
  smoke-no-rust-macos:
    name: smoke-no-rust (macos-x86_64)
    if: false
    needs: native-route
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Rust is not present
        run: |
          if command -v rustc >/dev/null 2>&1; then
            echo "ERROR: rustc is present on this runner — smoke would be invalid"
            exit 1
          fi
          if command -v cargo >/dev/null 2>&1; then
            echo "ERROR: cargo is present on this runner — smoke would be invalid"
            exit 1
          fi

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: ori-macos-x86_64
          path: dist

      - name: Extract release package
        run: |
          mkdir -p ~/ori-smoke
          tar -xzf dist/ori-macos-x86_64.tar.gz -C ~/ori-smoke --strip-components=1
          ls -la ~/ori-smoke/

      - name: Smoke — package without Rust
        run: |
          sh tools/smoke_no_rust.sh --package-root ~/ori-smoke
