name: release

# Builds the **Linux** native package (.tar.gz + .deb) and publishes a GitHub
# Release on tag `v*`. Windows/macOS packages deferred (DIST multi-OS).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist on the branch tip, e.g. v0.3.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package-linux:
    name: package-x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (repo rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - name: Show toolchain
        run: |
          rustc -Vv
          cargo -V
          which rustc ld cc
          ld --version | head -1 || true

      - name: Package (Linux tar.gz + deb)
        env:
          # CI package smoke is JIT-only: GitHub-hosted runners still fail
          # SystemLinker AOT with `cannot find -lc` despite multiarch -L and
          # libc6-dev (reproduced across 0.3.3–0.3.4). Local/dev AOT smoke
          # with SystemLinker remains the full gate (`tools/smoke_native_release.sh`
          # without ORI_PACKAGE_SMOKE_JIT_ONLY). Package still ships runtime for
          # end-user AOT when their toolchain can link.
          ORI_PACKAGE_SMOKE_JIT_ONLY: "1"
          ORI_USE_SYSTEM_LINKER: "1"
          CARGO_TERM_COLOR: always
        run: |
          set -eu
          set -o pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential dpkg-dev binutils libc6-dev gcc g++
          unset LIBRARY_PATH || true
          unset LIBPATH || true
          tag="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          fi
          version=$(printf '%s' "$tag" | sed 's/^v//')
          echo "tag=$tag version=$version smoke=JIT_ONLY"
          mkdir -p compiler/target/dist
          if ! env -u LIBRARY_PATH -u LIBPATH \
            ORI_PACKAGE_SMOKE_JIT_ONLY=1 ORI_USE_SYSTEM_LINKER=1 \
            bash tools/package_native_release.sh \
            --package-root "compiler/target/dist/ori-x86_64-unknown-linux-gnu" \
            --archive "compiler/target/dist/ori-${tag}-x86_64-unknown-linux-gnu.tar.gz" \
            --deb "compiler/target/dist/ori_${version}_amd64.deb" \
            --force 2>&1 | tee compiler/target/dist/package.log
          then
            echo "package_native_release failed; last 100 log lines:" >&2
            tail -n 100 compiler/target/dist/package.log >&2 || true
            exit 1
          fi
          ls -la compiler/target/dist/ || true
          test -f "compiler/target/dist/ori-${tag}-x86_64-unknown-linux-gnu.tar.gz"
          test -f "compiler/target/dist/ori_${version}_amd64.deb"

      - name: Upload package log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: package-log
          path: compiler/target/dist/package.log
          if-no-files-found: ignore

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ori-x86_64-unknown-linux-gnu
          path: |
            compiler/target/dist/ori-*-x86_64-unknown-linux-gnu.tar.gz
            compiler/target/dist/ori_*_amd64.deb
          if-no-files-found: error

  publish:
    name: publish-release
    needs: package-linux
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/') && needs.package-linux.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux package
        uses: actions/download-artifact@v4
        with:
          name: ori-x86_64-unknown-linux-gnu
          path: dist

      - name: List assets
        run: find dist -type f -ls || true

      - name: Require Linux package assets
        run: |
          tar_count=$(find dist -type f -name '*.tar.gz' | wc -l)
          deb_count=$(find dist -type f -name '*.deb' | wc -l)
          echo "tar_count=$tar_count deb_count=$deb_count"
          test "$tar_count" -ge 1
          test "$deb_count" -ge 1

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Ori ${{ github.ref_name }}
          body: |
            Ori **${{ github.ref_name }}** native package (**Linux only**).

            ### Assets
            - Portable: `ori-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz`
            - Debian/Ubuntu: `ori_*_amd64.deb`

            ### Install
            ```bash
            # tarball
            tar -xzf ori-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
            export PATH="$PWD/ori-x86_64-unknown-linux-gnu:$PATH"

            # or deb
            sudo dpkg -i ori_*_amd64.deb
            ori doctor
            ```

            AOT needs `build-essential`. JIT (`ori run`) does not.

            Windows/macOS packages deferred. See `docs/install.md`.

            ABI: `ori-native-abi-1` · FREEZE-1 in force on 0.3.x.
          prerelease: true
          fail_on_unmatched_files: false
          make_latest: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.deb
            dist/*.tar.gz
            dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
