name: release

# Builds native packages (Linux + Windows) and publishes a GitHub Release
# when a version tag is pushed (e.g. v0.3.2).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist on the branch tip, e.g. v0.3.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: package-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            smoke: sh
          - name: x86_64-pc-windows-msvc
            os: windows-latest
            smoke: powershell

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup toolchain install stable
          rustup default stable
          rustc -Vv
          cargo -V

      - name: Package (Unix)
        if: matrix.smoke == 'sh'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          sh tools/package_native_release.sh \
            --package-root "compiler/target/dist/ori-${{ matrix.name }}" \
            --archive "compiler/target/dist/ori-${{ github.ref_name }}-${{ matrix.name }}.tar.gz" \
            --force
          # normalize name if tag empty (workflow_dispatch)
          if [ ! -f "compiler/target/dist/ori-${{ github.ref_name }}-${{ matrix.name }}.tar.gz" ]; then
            ls -la compiler/target/dist/ || true
          fi

      - name: Package (Windows)
        if: matrix.smoke == 'powershell'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          $log = Join-Path $env:RUNNER_TEMP "ori-windows-package.log"
          Start-Transcript -Path $log -Force | Out-Null
          try {
            $ErrorActionPreference = "Stop"
            $root = (Resolve-Path .).Path
            $pkg = Join-Path $root "compiler\target\dist\ori-${{ matrix.name }}"
            $archive = Join-Path $root "compiler\target\dist\ori-${{ github.ref_name }}-${{ matrix.name }}.zip"
            Write-Host "PackageRoot=$pkg"
            Write-Host "ArchivePath=$archive"
            Write-Host "PSVersion=$($PSVersionTable.PSVersion)"
            Write-Host "PWD=$root"
            Get-ChildItem "$root\tools\*.ps1" | ForEach-Object { Write-Host "tool: $($_.FullName)" }
            rustc -Vv
            cargo -V
            # Dot-source free: invoke with explicit args
            $script = Join-Path $root "tools\package_native_release.ps1"
            if (-not (Test-Path -LiteralPath $script)) { throw "missing $script" }
            & $script -PackageRoot $pkg -ArchivePath $archive -Overwrite
            if (-not (Test-Path -LiteralPath $archive)) {
              throw "Archive not produced: $archive"
            }
            Get-Item $archive | Format-List FullName, Length
          } catch {
            Write-Host "ERROR: $($_.Exception.GetType().FullName): $($_.Exception.Message)"
            Write-Host "ScriptStackTrace:`n$($_.ScriptStackTrace)"
            Write-Host "InvocationInfo: $($_.InvocationInfo.PositionMessage)"
            throw
          } finally {
            Stop-Transcript | Out-Null
            if (Test-Path -LiteralPath $log) {
              Copy-Item -LiteralPath $log -Destination "compiler\target\dist\ori-windows-package.log" -Force -ErrorAction SilentlyContinue
              New-Item -ItemType Directory -Force -Path "compiler\target\dist" | Out-Null
              Copy-Item -LiteralPath $log -Destination "compiler\target\dist\ori-windows-package.log" -Force
              Get-Content $log | Select-Object -Last 80
            }
          }

      - name: Upload package artifact
        if: always() && matrix.smoke == 'powershell' || matrix.smoke == 'sh'
        uses: actions/upload-artifact@v4
        with:
          name: ori-${{ matrix.name }}
          path: |
            compiler/target/dist/ori-*-${{ matrix.name }}.tar.gz
            compiler/target/dist/ori-*-${{ matrix.name }}.zip
            compiler/target/dist/ori-windows-package.log
          if-no-files-found: warn

  publish:
    name: publish-release
    needs: package
    runs-on: ubuntu-latest
    # Publish even if one OS matrix leg fails (prefer partial release + fix follow-up).
    if: always() && startsWith(github.ref, 'refs/tags/') && needs.package.result != 'cancelled'
    steps:
      - uses: actions/checkout@v4

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
        continue-on-error: true

      - name: List assets
        run: find dist -type f -ls || true

      - name: Require at least one package asset
        run: |
          count=$(find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) | wc -l)
          echo "asset_count=$count"
          test "$count" -ge 1

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Ori ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: true
          fail_on_unmatched_files: false
          make_latest: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/*.tar.gz
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
