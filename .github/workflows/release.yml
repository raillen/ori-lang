name: release

# Builds the **Linux** native package and publishes a GitHub Release on tag `v*`.
# Windows/macOS packages are deferred (Linux-only product path — BACKLOG DIST-1/2).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist on the branch tip, e.g. v0.3.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package-linux:
    name: package-x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Show toolchain
        run: |
          rustc -Vv
          cargo -V

      - name: Package (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          sh tools/package_native_release.sh \
            --package-root "compiler/target/dist/ori-x86_64-unknown-linux-gnu" \
            --archive "compiler/target/dist/ori-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz" \
            --force
          ls -la compiler/target/dist/ || true

      # True smoke-no-rust (no rustc on PATH) lives in native-route.yml
      # (smoke-no-rust-linux). This job already has Rust to *build* the package.

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ori-x86_64-unknown-linux-gnu
          path: |
            compiler/target/dist/ori-*-x86_64-unknown-linux-gnu.tar.gz
          if-no-files-found: error

  publish:
    name: publish-release
    needs: package-linux
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/') && needs.package-linux.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux package
        uses: actions/download-artifact@v4
        with:
          name: ori-x86_64-unknown-linux-gnu
          path: dist

      - name: List assets
        run: find dist -type f -ls || true

      - name: Require Linux package asset
        run: |
          count=$(find dist -type f -name '*.tar.gz' | wc -l)
          echo "asset_count=$count"
          test "$count" -ge 1

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Ori ${{ github.ref_name }}
          body: |
            Ori **${{ github.ref_name }}** native package (**Linux only**).

            - Linux: `ori-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz`

            Windows/macOS release packages are deferred. See `docs/install.md` and
            `docs/planning/BACKLOG.md` (DIST-1 / DIST-2).

            ABI: `ori-native-abi-1`.
          prerelease: true
          fail_on_unmatched_files: false
          make_latest: true
          files: |
            dist/**/*.tar.gz
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
