name: release

# Builds native packages for Linux, Windows, and macOS and publishes a GitHub
# Release on tag `v*`. Also runnable via workflow_dispatch for dry packaging.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist on the branch tip, e.g. v0.3.5)"
        required: false
        type: string
      publish:
        description: "Create/update GitHub Release (needs a tag)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  package:
    name: package-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            smoke: sh
            archive_ext: tar.gz
            skip_deb: "0"
          - name: x86_64-pc-windows-msvc
            os: windows-latest
            smoke: powershell
            archive_ext: zip
            skip_deb: "1"
          - name: aarch64-apple-darwin
            os: macos-15
            smoke: sh
            archive_ext: tar.gz
            skip_deb: "1"
          - name: x86_64-apple-darwin
            os: macos-15-intel
            smoke: sh
            archive_ext: tar.gz
            skip_deb: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (repo rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - name: Show toolchain
        shell: bash
        run: |
          rustc -Vv
          cargo -V
          uname -a || true

      - name: Install Linux packaging deps
        if: matrix.smoke == 'sh' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential dpkg-dev binutils libc6-dev gcc g++

      - name: Package (Windows)
        if: matrix.smoke == 'powershell'
        shell: pwsh
        env:
          ORI_PACKAGE_SMOKE_JIT_ONLY: "1"
          ORI_USE_SYSTEM_LINKER: "1"
          CARGO_TERM_COLOR: always
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $inputTag = "${{ inputs.tag }}"
            if ($inputTag -and $inputTag.Trim().Length -gt 0) { $tag = $inputTag.Trim() }
          }
          pwsh -NoProfile -File tools/ci_package_windows.ps1 -Tag $tag -TargetName "${{ matrix.name }}"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package (Unix)
        if: matrix.smoke == 'sh'
        shell: bash
        env:
          # CI package smoke is JIT-only on some runners (see Linux note in history).
          ORI_PACKAGE_SMOKE_JIT_ONLY: "1"
          ORI_USE_SYSTEM_LINKER: "1"
          CARGO_TERM_COLOR: always
        run: |
          set -eu
          set -o pipefail
          unset LIBRARY_PATH || true
          unset LIBPATH || true
          tag="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          fi
          case "$tag" in v*) ;; *) tag="v$tag" ;; esac
          version=$(printf '%s' "$tag" | sed 's/^v//')
          echo "tag=$tag version=$version target=${{ matrix.name }}"
          mkdir -p compiler/target/dist
          root="compiler/target/dist/ori-${{ matrix.name }}"
          archive="compiler/target/dist/ori-${tag}-${{ matrix.name }}.tar.gz"
          deb_args=""
          if [ "${{ matrix.skip_deb }}" = "0" ]; then
            deb_args="--deb compiler/target/dist/ori_${version}_amd64.deb"
          else
            deb_args="--skip-deb"
          fi
          if ! env -u LIBRARY_PATH -u LIBPATH \
            ORI_PACKAGE_SMOKE_JIT_ONLY=1 ORI_USE_SYSTEM_LINKER=1 \
            bash tools/package_native_release.sh \
            --package-root "$root" \
            --archive "$archive" \
            $deb_args \
            --force 2>&1 | tee "compiler/target/dist/package-${{ matrix.name }}.log"
          then
            echo "package failed; last 100 log lines:" >&2
            tail -n 100 "compiler/target/dist/package-${{ matrix.name }}.log" >&2 || true
            exit 1
          fi
          ls -la compiler/target/dist/ || true
          test -f "$archive"
          if [ "${{ matrix.skip_deb }}" = "0" ]; then
            test -f "compiler/target/dist/ori_${version}_amd64.deb"
          fi

      - name: Upload package log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: package-log-${{ matrix.name }}
          path: compiler/target/dist/package-*.log
          if-no-files-found: ignore

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ori-${{ matrix.name }}
          path: |
            compiler/target/dist/ori-*-${{ matrix.name }}.tar.gz
            compiler/target/dist/ori-*-${{ matrix.name }}.zip
            compiler/target/dist/ori_*_amd64.deb
          if-no-files-found: error

  publish:
    name: publish-release
    needs: package
    runs-on: ubuntu-latest
    if: >-
      always()
      && needs.package.result == 'success'
      && (
        startsWith(github.ref, 'refs/tags/')
        || (github.event_name == 'workflow_dispatch' && inputs.publish == true && inputs.tag != '')
      )
    steps:
      - uses: actions/checkout@v4

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: ori-*
          merge-multiple: true

      - name: List assets
        run: find dist -type f -ls || true

      - name: Require multi-OS assets
        run: |
          set -eu
          tar_count=$(find dist -type f -name '*.tar.gz' | wc -l)
          zip_count=$(find dist -type f -name '*.zip' | wc -l)
          deb_count=$(find dist -type f -name '*.deb' | wc -l)
          echo "tar_count=$tar_count zip_count=$zip_count deb_count=$deb_count"
          # Linux + macOS tarballs (at least 2), Windows zip (1), deb (1)
          test "$tar_count" -ge 2
          test "$zip_count" -ge 1
          test "$deb_count" -ge 1

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          case "$tag" in v*) ;; *) tag="v$tag" ;; esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Ori ${{ steps.tag.outputs.tag }}
          body: |
            Ori **${{ steps.tag.outputs.tag }}** native packages.

            ### Assets
            | Platform | File |
            |----------|------|
            | Linux x86_64 | `ori-${{ steps.tag.outputs.tag }}-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux deb | `ori_*_amd64.deb` |
            | Windows MSVC x86_64 | `ori-${{ steps.tag.outputs.tag }}-x86_64-pc-windows-msvc.zip` |
            | macOS Apple Silicon | `ori-${{ steps.tag.outputs.tag }}-aarch64-apple-darwin.tar.gz` |
            | macOS Intel | `ori-${{ steps.tag.outputs.tag }}-x86_64-apple-darwin.tar.gz` |

            ### Install
            See [`docs/install.md`](https://github.com/raillen/ori-lang/blob/master/docs/install.md).

            - **AOT** needs the OS linker (VS Build Tools / build-essential / Xcode CLT).
            - **JIT** (`ori run`) needs only the packaged runtime cdylib.

            ABI: `ori-native-abi-1` · FREEZE-1 on 0.3.x.
          prerelease: true
          fail_on_unmatched_files: false
          make_latest: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/**/*.deb
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
