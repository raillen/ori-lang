name: release

# Builds native packages (Linux + Windows) and publishes a GitHub Release
# when a version tag is pushed (e.g. v0.3.2).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist on the branch tip, e.g. v0.3.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: package-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            smoke: sh
          - name: x86_64-pc-windows-msvc
            os: windows-latest
            smoke: powershell

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup toolchain install stable
          rustup default stable
          rustc -Vv
          cargo -V

      - name: Package (Unix)
        if: matrix.smoke == 'sh'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          sh tools/package_native_release.sh \
            --package-root "compiler/target/dist/ori-${{ matrix.name }}" \
            --archive "compiler/target/dist/ori-${{ github.ref_name }}-${{ matrix.name }}.tar.gz" \
            --force
          # normalize name if tag empty (workflow_dispatch)
          if [ ! -f "compiler/target/dist/ori-${{ github.ref_name }}-${{ matrix.name }}.tar.gz" ]; then
            ls -la compiler/target/dist/ || true
          fi

      - name: Package (Windows)
        if: matrix.smoke == 'powershell'
        shell: pwsh
        run: |
          .\tools\package_native_release.ps1 `
            -PackageRoot "compiler\target\dist\ori-${{ matrix.name }}" `
            -ArchivePath "compiler\target\dist\ori-$env:GITHUB_REF_NAME-${{ matrix.name }}.zip" `
            -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ori-${{ matrix.name }}
          path: |
            compiler/target/dist/ori-*-${{ matrix.name }}.tar.gz
            compiler/target/dist/ori-*-${{ matrix.name }}.zip
          if-no-files-found: error

  publish:
    name: publish-release
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        run: find dist -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Ori ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: true
          files: |
            dist/*.tar.gz
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
